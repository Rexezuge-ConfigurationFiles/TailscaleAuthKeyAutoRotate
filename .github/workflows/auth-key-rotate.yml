# $version: v1-1774458641
name: Rotate Tailscale auth key into Cloudflare

on:
  schedule:
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  rotate:
    name: "Rorate"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          npm install -g wrangler@latest

      - name: Exchange OAuth Client for Tailscale API Access Token
        id: oauth
        run: |
          set -euo pipefail

          RESP="$(
            curl -fsS https://api.tailscale.com/api/v2/oauth/token \
              -d "client_id=${TS_OAUTH_CLIENT_ID}" \
              -d "client_secret=${TS_OAUTH_CLIENT_SECRET}" \
              -d "scope=auth_keys"
          )"

          ACCESS_TOKEN="$(echo "$RESP" | jq -r '.access_token')"

          if [ -z "$ACCESS_TOKEN" ] || [ "$ACCESS_TOKEN" = "null" ]; then
            echo "Failed to obtain Tailscale access token"
            echo "$RESP"
            exit 1
          fi

          echo "::add-mask::$ACCESS_TOKEN"
          echo "access_token=$ACCESS_TOKEN" >> "$GITHUB_OUTPUT"
        env:
          TS_OAUTH_CLIENT_ID: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          TS_OAUTH_CLIENT_SECRET: ${{ secrets.TS_OAUTH_CLIENT_SECRET }}

      - name: Create New Tailscale Auth Key
        id: create_key
        run: |
          set -euo pipefail

          PAYLOAD="$(jq -n \
            --arg tag "$TS_TAG" \
            '{
              capabilities: {
                devices: {
                  create: {
                    reusable: true,
                    ephemeral: true,
                    preauthorized: true,
                    tags: [$tag]
                  }
                }
              },
              expirySeconds: 2592000,
              description: "Rotated by GitHub Workflows"
            }'
          )"

          RESP="$(
            curl -fsS -X POST "https://api.tailscale.com/api/v2/tailnet/-/keys" \
              -H "Authorization: Bearer ${{ steps.oauth.outputs.access_token }}" \
              -H "Content-Type: application/json" \
              --data "$PAYLOAD"
          )"

          TS_AUTHKEY="$(echo "$RESP" | jq -r '.key')"

          if [ -z "$TS_AUTHKEY" ] || [ "$TS_AUTHKEY" = "null" ]; then
            echo "Failed to create Tailscale auth key"
            echo "$RESP"
            exit 1
          fi

          echo "::add-mask::$TS_AUTHKEY"
          echo "ts_authkey=$TS_AUTHKEY" >> "$GITHUB_OUTPUT"
        env:
          TS_TAG: ${{ vars.TS_TAG }}

      - name: Write Secret to Cloudflare Secrets Store
        run: |
          set -euo pipefail
          echo 'Find $CF_SECRET_ID with `wrangler secrets-store secret list "$CF_STORE_ID" --remote`'
          wrangler secrets-store secret update "$CF_STORE_ID" \
                   --secret-id "$CF_SECRET_ID" \
                   --value ${{ steps.create_key.outputs.ts_authkey }} \
                   --remote \
                   --comment='Rotated by GitHub Workflows'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CF_STORE_ID: ${{ secrets.CF_STORE_ID }}
          CF_SECRET_ID: ${{ secrets.CF_SECRET_ID }}
